openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ResQ First Aid Chatbot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Chat and NLP operations
  - name: hospitals
    description: Nearby hospital operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat/message:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message to the ResQ chatbot
      description: Processes user message using NLP and returns first aid guidance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: Chatbot response with first aid guidance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /hospitals/nearby:
    post:
      operationId: getNearbyHospitals
      tags: [hospitals]
      summary: Get nearby hospitals based on location
      description: Returns a list of hospitals near the given coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationBody"
      responses:
        "200":
          description: List of nearby hospitals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatMessageBody:
      type: object
      properties:
        message:
          type: string
          description: The user's message describing the emergency or asking for first aid guidance
        sessionId:
          type: string
          description: Session identifier for conversation context
        latitude:
          type: number
          description: User's latitude (optional, for emergency referrals)
        longitude:
          type: number
          description: User's longitude (optional, for emergency referrals)
      required:
        - message
        - sessionId

    ChatResponse:
      type: object
      properties:
        response:
          type: string
          description: The chatbot's first aid guidance response
        isEmergency:
          type: boolean
          description: Whether this is classified as a life-threatening emergency
        emergencyLevel:
          type: string
          enum: [low, moderate, high, critical]
          description: Severity level of the situation
        steps:
          type: array
          items:
            type: string
          description: Step-by-step first aid instructions
        sessionId:
          type: string
        callEmergency:
          type: boolean
          description: Whether to advise calling emergency services
        nearbyHospitals:
          type: array
          items:
            $ref: "#/components/schemas/Hospital"
          description: Nearby hospitals if location was provided and emergency is critical
      required:
        - response
        - isEmergency
        - emergencyLevel
        - steps
        - sessionId
        - callEmergency

    LocationBody:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
      required:
        - latitude
        - longitude

    Hospital:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        distance:
          type: string
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
      required:
        - name
        - address
        - distance

    HospitalsResponse:
      type: object
      properties:
        hospitals:
          type: array
          items:
            $ref: "#/components/schemas/Hospital"
      required:
        - hospitals
