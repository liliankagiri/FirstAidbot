kind = "web"
previewPath = "/"
title = "ResQ - First Aid Chatbot"
version = "1.0.0"
id = "artifacts/resq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21579

[services.development]
run = "pnpm --filter @workspace/resq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resq", "run", "build" ]
publicDir = "artifacts/resq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21579"
BASE_PATH = "/"
